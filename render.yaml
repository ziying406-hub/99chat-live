services:
  - type: web
    name: 99chat
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8080
      - key: WEB_DIR
        value: /app/web
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: RESET_DATABASE_MARKER
        value: 20260708-clean-launch
